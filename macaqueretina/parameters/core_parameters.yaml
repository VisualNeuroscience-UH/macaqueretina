model_root_path: /opt3/projects
project: macaqueretina
experiment: retina_input_development
input_subfolder: in  # input VAE models, images, videos, other data
output_subfolder: out # spikes, retinas, experiment metadata. null for experiments creating the folders
stimulus_subfolder: stimuli # /opt3/images/c1_200 #/opt3/movies/Videos/stims 
numpy_seed: null  # null for random or int for fixed seed
device: cpu  # "cpu" or "cuda"

run:
  build_retina: True
  make_stimulus: true
  simulate_retina: True
  visualize_DoG_img_grid: 
    show: False
    gc_list: [0, 1, 5, 10]
    n_samples: null
    savefigname: null
  visualize_all_gc_responses: 
    show: False
  experiment:
    run_experiment: False
    script_path: docs/examples/experiment_hpc.py
