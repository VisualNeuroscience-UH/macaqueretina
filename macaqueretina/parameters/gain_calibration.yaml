gain_calibration:
  # drifting grating calibration table
  calibrated_gain_table:
    threshold: 10  # Hz
    parasol:
      "on":
        DOG:
          fixed: 0.61
          dynamic: 0.86
          subunit: 37.3
        VAE:
          fixed: 0.78
          dynamic: 0.91
          subunit: 26.8
      "off":
        DOG:
          fixed: 1.29
          dynamic: 1.56
          subunit: 81.6
        VAE:
          fixed: 1.42
          dynamic: 1.63
          subunit: 64.6
    midget:
      "on":
        DOG:
          fixed: 1.69
          dynamic: 2.31
          subunit: 53.7
        VAE:
          fixed: 1.86
          dynamic: 2.48
          subunit: 44.6
      "off":
        DOG:
          fixed: 2.83
          dynamic: 3.62
          subunit: 193.3
        VAE:
          fixed: 3.04
          dynamic: 3.60
          subunit: 115.6

  # Cone noise gain induces ~25Hz spontaneous firing rates for the ON parasol and
  # midget gc units, and ~5Hz for the OFF parasol and midget units. (Raunak Sinha,
  # personal communication). There are slight variations in final noise rates 
  # due to rectification and spike generation.
  noise_fr_mean_table:
    "on": 
      parasol: 25
      midget: 25
    "off":
      parasol: 5
      midget: 5
