gain_calibration:
  # drifting grating calibration table
  signal_gain_table:
    parasol:
      "on":
        DOG:
          fixed: 0.61
          dynamic: 0.86
          subunit: 3.73
        VAE:
          fixed: 0.78
          dynamic: 0.91
          subunit: 3.58
      "off":
        DOG:
          fixed: 1.29
          dynamic: 1.56
          subunit: 7.6
        VAE:
          fixed: 1.42
          dynamic: 1.63
          subunit: 6.33
    midget:
      "on":
        DOG:
          fixed: 1.69
          dynamic: 2.31
          subunit: 3.53
        VAE:
          fixed: 1.86
          dynamic: 2.48
          subunit: 3.7
      "off":
        DOG:
          fixed: 2.83
          dynamic: 3.62
          subunit: 8.38
        VAE:
          fixed: 3.04
          dynamic: 3.60
          subunit: 8.84

  # Cone noise gain induces ~25Hz spontaneous firing rates for the ON parasol and
  # midget gc units, and ~5Hz for the OFF parasol and midget units. (Raunak Sinha,
  # personal communication). There are slight variations in final noise rates 
  # due to rectification and spike generation.
  noise_fr_mean:
    "on": 
      parasol: 25
      midget: 25
    "off":
      parasol: 5
      midget: 5
