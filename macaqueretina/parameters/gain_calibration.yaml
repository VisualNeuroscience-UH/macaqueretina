gain_calibration:
  # drifting grating calibration table
  calibrated_gain_table:
    threshold: 10  # Hz
    parasol:
      "on":
        DOG:
          fixed: 0.61
          dynamic: 0.86
          subunit: 3.34
        VAE:
          fixed: 0.66
          dynamic: 0.91
          subunit: 3.17
      "off":
        DOG:
          fixed: 1.24
          dynamic: 1.53
          subunit: 8.14
        VAE:
          fixed: 1.40
          dynamic: 1.58
          subunit: 7.25
    midget:
      "on":
        DOG:
          fixed: 1.69
          dynamic: 2.27
          subunit: 2.87
        VAE:
          fixed: 1.86
          dynamic: 2.36
          subunit: 2.89
      "off":
        DOG:
          fixed: 2.61
          dynamic: 3.32 
          subunit: 8.16
        VAE:
          fixed: 2.80
          dynamic: 3.30
          subunit: 8.16

  # Cone noise gain induces ~25Hz spontaneous firing rates for the ON parasol and
  # midget gc units, and ~5Hz for the OFF parasol and midget units. (Raunak Sinha,
  # personal communication). There are slight variations in final noise rates 
  # due to rectification and spike generation.
  noise_fr_mean_table:
    "on": 
      parasol: 25
      midget: 25
    "off":
      parasol: 5
      midget: 5
