gain_calibration:
  # drifting grating calibration table
  calibrated_gain_table:
    threshold: 10  # Hz
    parasol:
      "on":
        DOG:
          fixed: 0.61 # 1.29
          dynamic: 0.86 # 2.06
          subunit: 3.34 # 3.51
        VAE:
          fixed: 0.66 # 1.81
          dynamic: 0.91 # 2.31
          subunit: 3.47
      "off":
        DOG:
          fixed: 1.24 # 1.75
          dynamic: 1.53 # 2.15
          subunit: 8.14 # 7.02
        VAE:
          fixed: 1.40 # 1.87
          dynamic: 1.58 # 2.10
          subunit: 7.25 # 6.38
    midget:
      "on":
        DOG:
          fixed: 1.69 # 4.60
          dynamic: 2.27 # 6.38
          subunit: 2.87 # 9.16
        VAE:
          fixed: 1.86 # 5.10
          dynamic: 2.36 # 6.69
          subunit: 2.89 # 8.54
      "off":
        DOG:
          fixed: 2.61 # 4.48
          dynamic: 3.32 # 5.52
          subunit: 8.16 # 14.35
        VAE:
          fixed: 2.80 # 4.61
          dynamic: 3.30 # 5.74
          subunit: 8.16 # 13.54

  # Cone noise gain induces ~25Hz spontaneous firing rates for the ON parasol and
  # midget gc units, and ~5Hz for the OFF parasol and midget units. (Raunak Sinha,
  # personal communication). There are slight variations in final noise rates 
  # due to rectification and spike generation.
  noise_fr_mean_table:
    "on": 
      parasol: 25
      midget: 25
    "off":
      parasol: 5
      midget: 5
