default:
  image: python:3.14-bookworm
  before_script:
    - export PATH=/tmp/.local/bin:$PATH
    - pip install poetry
    - poetry install --without dev
    - VENV_PATH=$(poetry env info --path)
    - source "$VENV_PATH/bin/activate"
    - pip install pyyaml

stages:
  - test
  - deploy

tests:
  stage: test
  script:
    - echo "Running unit tests..."
    - pytest tests/unit_tests
    - ./get_vae_models.sh -y
    - echo "Running integration tests..."
    - pytest tests/integration_tests/test_retina_constructor_cpu.py
    - pytest tests/integration_tests/test_retina_simulator_cpu.py
    - pytest tests/integration_tests/test_stimulus_factory.py
  tags:
    - openshift
  variables:
    HOME: /tmp

deploy-prod:
  stage: deploy
  image: bitnami/git:latest
  before_script: []
  script:
    - git remote add github https://$GITHUB_PAT@github.com/VisualNeuroscience-UH/macaqueretina.git
    - git push github "+$CI_COMMIT_SHA:main"
  variables:
    HOME: /tmp
    GIT_DEPTH: "0"
  rules:
    - if: $CI_COMMIT_REF_NAME == "main"
  tags:
    - openshift
